<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Minecraft JS</h1>

  <div id="toolbar">
    <button data-tool="axe">Axe</button>
    <button data-tool="pickaxe">Pickaxe</button>
    <button data-tool="shovel">Shovel</button>
  </div>

  <div id="world"></div>

  <h2>Inventory</h2>
  <div id="inventory"></div>

  <button id="resetBtn">Reset World</button>

  <script src="script.js"></script>
</body>
</html>
