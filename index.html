<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft 2D Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="landing-page">
        <h1>Welcome to Minecraft 2D</h1>
        <h2>How to Play:</h2>
        <ul>
            <li><strong>Axe:</strong> Removes Tree tiles.</li>
            <li><strong>Pickaxe:</strong> Removes Rock tiles.</li>
            <li><strong>Shovel:</strong> Removes Dirt tiles.</li>
            <li>Collected tiles are stored in your inventory and can be placed back on empty spaces.</li>
        </ul>
        <button id="start-btn">Start Game</button>
    </div>

    <div id="game-container" class="hidden">
        
        <div id="toolbar">
            <button class="tool" data-tool="axe">🪓 Axe</button>
            <button class="tool" data-tool="pickaxe">⛏️ Pickaxe</button>
            <button class="tool" data-tool="shovel">铲 Shovel</button>
        </div>

        <div id="world"></div>

        <div id="inventory-container">
            <h3>Inventory</h3>
            <div id="inventory"></div>
        </div>

        <button id="reset-btn">Reset World</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
